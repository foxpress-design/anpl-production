name: Deploy to GitHub Pages

on:
  repository_dispatch:
    types: [deploy]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout staging source
        uses: actions/checkout@v4
        with:
          repository: foxpress-design/anpl-staging
          ref: main
          token: ${{ secrets.STAGING_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Patch config for production
        run: |
          # Swap site URL
          sed -i "s|https://staging.anpl.org|https://anpl.org|g" astro.config.mjs
          # Replace Netlify adapter with passthrough image service (no /.netlify/images)
          sed -i "s|import netlify from '@astrojs/netlify';|// netlify adapter removed for production|" astro.config.mjs
          sed -i "s|adapter: netlify(),|image: { service: { entrypoint: 'astro/assets/services/sharp' } },|" astro.config.mjs

      - name: Build
        run: npx astro build
        env:
          KEYSTATIC_STORAGE_KIND: github

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
